<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Intel Swarm{% block title %}{% endblock %}</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #222;
      --text: #e8e8e8;
      --muted: #666;
      --dim: #444;
      --accent: #c8a96e;
      --red: #e05252;
      --green: #52a86e;
      --mono: 'SF Mono', 'Fira Code', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.6; }

    /* ── MASTHEAD ── */
    .masthead {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,13,.96); backdrop-filter: blur(8px);
    }
    .masthead-brand {
      font-family: var(--mono); font-size: 13px; font-weight: 700;
      letter-spacing: .12em; color: var(--accent); white-space: nowrap;
      padding: 14px 0; text-decoration: none;
    }
    .masthead-meta {
      display: flex; align-items: center; gap: 12px;
      margin-left: auto; flex-shrink: 0;
    }
    .masthead-meta span { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .live { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; color: var(--green); }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .date-select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 11px;
      padding: 4px 8px; border-radius: 4px; outline: none; cursor: pointer;
    }
    .lang-toggle { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .lang-btn {
      font-family: var(--mono); font-size: 11px; padding: 4px 10px;
      cursor: pointer; color: var(--muted); border: none; background: transparent;
    }
    .lang-btn.active { background: var(--accent); color: #0d0d0d; font-weight: 700; }

    /* ── DOMAIN NAV ── */
    .domain-nav {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; gap: 0;
      overflow-x: auto; scrollbar-width: none;
      background: var(--surface);
    }
    .domain-nav::-webkit-scrollbar { display: none; }
    .domain-nav a {
      font-family: var(--mono); font-size: 11px; letter-spacing: .05em;
      color: var(--muted); text-decoration: none; white-space: nowrap;
      padding: 10px 14px; border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .domain-nav a:hover { color: var(--text); }
    .domain-nav a.active, .domain-nav a[data-active="true"] { color: var(--accent); border-bottom-color: var(--accent); }
    .domain-nav .nav-sep { width: 1px; height: 16px; background: var(--border); margin: 0 6px; flex-shrink: 0; }

    /* ── CONTENT WRAPPER ── */
    .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ── HOME: SYNTHESIS STRIP ── */
    .syn-strip {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 6px; padding: 20px 24px; margin-bottom: 32px;
    }
    .syn-strip-label { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: .1em; margin-bottom: 8px; }
    .syn-strip-headline { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 10px; line-height: 1.4; }
    .syn-strip-body { font-size: 13px; color: var(--muted); line-height: 1.6; }

    /* ── HOME: DOMAIN FEED ── */
    .feed { display: flex; flex-direction: column; gap: 2px; }
    .feed-row {
      display: grid; grid-template-columns: 180px 1fr;
      border: 1px solid var(--border); border-radius: 6px;
      text-decoration: none; color: inherit; transition: all .12s;
      overflow: hidden; background: var(--surface);
    }
    .feed-row:hover { border-color: var(--accent); background: #1a1a1a; }
    .feed-left {
      padding: 16px 18px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; justify-content: center; gap: 4px;
    }
    .feed-emoji { font-size: 20px; }
    .feed-name { font-family: var(--mono); font-size: 12px; color: var(--accent); font-weight: 700; letter-spacing: .04em; }
    .feed-status { font-family: var(--mono); font-size: 10px; }
    .feed-status.filed { color: var(--green); }
    .feed-status.pending { color: var(--dim); }
    .feed-right { padding: 16px 20px; min-width: 0; }
    .feed-headline { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
    .feed-preview { font-size: 12px; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* ── DOMAIN PAGE ── */
    .domain-header { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .domain-header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .domain-big-emoji { font-size: 28px; }
    .domain-big-name { font-size: 26px; font-weight: 700; }
    .domain-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    .article { max-width: 780px; }
    .article h1 { font-size: 22px; font-weight: 700; margin: 28px 0 10px; color: var(--text); line-height: 1.3; }
    .article h2 { font-size: 18px; font-weight: 600; margin: 24px 0 8px; color: var(--text); }
    .article h3 { font-size: 15px; font-weight: 600; margin: 20px 0 6px; color: var(--accent); }
    .article p { margin-bottom: 12px; color: var(--muted); line-height: 1.7; font-size: 14px; }
    .article ul, .article ol { padding-left: 20px; margin-bottom: 14px; }
    .article li { color: var(--muted); line-height: 1.7; font-size: 14px; margin-bottom: 6px; }
    .article strong { color: var(--text); font-weight: 600; }
    .article a { color: var(--accent); text-decoration: none; }
    .article a:hover { text-decoration: underline; }
    .article hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* ── THREADS SECTION ── */
    .threads-section { margin-top: 48px; border-top: 1px solid var(--border); padding-top: 24px; max-width: 780px; }
    .threads-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .1em; margin-bottom: 16px; }
    .threads-body { font-size: 13px; color: var(--muted); line-height: 1.7; }
    .threads-body h3 { font-size: 13px; font-weight: 600; color: var(--text); margin: 16px 0 4px; }
    .threads-body strong { color: var(--text); }
    .threads-body ul { padding-left: 16px; }
    .threads-body li { margin-bottom: 4px; }
    .threads-body a { color: var(--accent); text-decoration: none; }

    /* ── ARCHIVE ── */
    .archive-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 24px; }
    .archive-link { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; padding: 4px 10px; border: 1px solid var(--border); border-radius: 3px; }
    .archive-link:hover, .archive-link.active { color: var(--accent); border-color: var(--accent); }

    /* ── EMPTY ── */
    .empty-state { padding: 48px 0; text-align: center; color: var(--dim); font-family: var(--mono); font-size: 13px; }
  </style>
</head>
<body>

<header class="masthead">
  <a class="masthead-brand" href="/?lang={{ lang|default('en') }}">⬡ INTEL SWARM</a>
  <div class="masthead-meta">
    <div class="live"><span class="live-dot"></span>LIVE</div>
    <select class="date-select" onchange="navigateDate(this.value)">
      {% for d in dates %}
      <option value="{{ d }}" {% if d == (date|default('')) %}selected{% endif %}>{{ d }}</option>
      {% endfor %}
    </select>
    <div class="lang-toggle">
      <button class="lang-btn {% if (lang|default('en')) == 'en' %}active{% endif %}" onclick="setLang('en')">EN</button>
      <button class="lang-btn {% if (lang|default('en')) == 'zh' %}active{% endif %}" onclick="setLang('zh')">中文</button>
    </div>
  </div>
</header>

<nav class="domain-nav">
  <a href="/?lang={{ lang|default('en') }}" {% block nav_home %}{% endblock %}>
    {% if (lang|default('en')) == 'zh' %}今日{% else %}Today{% endif %}
  </a>
  <div class="nav-sep"></div>
  {% for rid, emoji, name, zh_name in researchers %}
  <a href="/domain/{{ rid }}?lang={{ lang|default('en') }}" {% block nav_domain %}{% endblock %} data-rid="{{ rid }}">
    {{ emoji }} {% if (lang|default('en')) == 'zh' %}{{ zh_name }}{% else %}{{ name }}{% endif %}
  </a>
  {% endfor %}
</nav>

{% block body %}{% endblock %}

<script>
function getLang() { return new URLSearchParams(window.location.search).get('lang') || 'en'; }
function setLang(lang) {
  const url = new URL(window.location.href);
  url.searchParams.set('lang', lang);
  window.location = url.toString();
}
function navigateDate(d) {
  const path = window.location.pathname;
  const lang = getLang();
  let base;
  if (path.startsWith('/domain/')) {
    base = '/domain/' + path.split('/')[2] + '/' + d;
  } else if (path.startsWith('/brief')) {
    base = '/brief/' + d;
  } else {
    base = '/date/' + d;
  }
  window.location = base + '?lang=' + lang;
}
// Highlight active domain in nav
(function(){
  const path = window.location.pathname;
  const m = path.match(/^\/domain\/([^/]+)/);
  if (m) {
    const a = document.querySelector(`.domain-nav [data-rid="${m[1]}"]`);
    if (a) a.setAttribute('data-active','true');
  }
})();
</script>
</body>
</html>
