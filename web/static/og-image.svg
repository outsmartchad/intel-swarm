<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#060a0e"/>
    </radialGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#5b9cf6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#5b9cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Hexagon logo mark -->
  <g transform="translate(140, 315)">
    <!-- Outer hex -->
    <polygon points="0,-72 62.4,-36 62.4,36 0,72 -62.4,36 -62.4,-36"
             fill="none" stroke="#c8a96e" stroke-width="1.5" opacity="0.9"/>
    <!-- Middle hex -->
    <polygon points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26"
             fill="none" stroke="#c8a96e" stroke-width="1" opacity="0.5"/>
    <!-- Inner hex filled -->
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"
             fill="#c8a96e" opacity="0.15"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="#c8a96e" opacity="0.95"/>
    <!-- Connecting spokes -->
    <line x1="0" y1="-30" x2="0" y2="-52" stroke="#c8a96e" stroke-width="1" opacity="0.4"/>
    <line x1="26" y1="-15" x2="45" y2="-26" stroke="#c8a96e" stroke-width="1" opacity="0.4"/>
    <line x1="26" y1="15" x2="45" y2="26" stroke="#c8a96e" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="30" x2="0" y2="52" stroke="#c8a96e" stroke-width="1" opacity="0.4"/>
    <line x1="-26" y1="15" x2="-45" y2="26" stroke="#c8a96e" stroke-width="1" opacity="0.4"/>
    <line x1="-26" y1="-15" x2="-45" y2="-26" stroke="#c8a96e" stroke-width="1" opacity="0.4"/>
    <!-- Node dots at outer corners -->
    <circle cx="0" cy="-72" r="3" fill="#c8a96e" opacity="0.7"/>
    <circle cx="62.4" cy="-36" r="3" fill="#c8a96e" opacity="0.7"/>
    <circle cx="62.4" cy="36" r="3" fill="#c8a96e" opacity="0.7"/>
    <circle cx="0" cy="72" r="3" fill="#c8a96e" opacity="0.7"/>
    <circle cx="-62.4" cy="36" r="3" fill="#c8a96e" opacity="0.7"/>
    <circle cx="-62.4" cy="-36" r="3" fill="#c8a96e" opacity="0.7"/>
  </g>

  <!-- Divider line -->
  <line x1="240" y1="230" x2="240" y2="400" stroke="rgba(200,169,110,0.25)" stroke-width="1"/>

  <!-- INTEL SWARM wordmark -->
  <text x="275" y="296" font-family="Inter, -apple-system, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-2"
        fill="#f0f0f0">INTEL</text>
  <text x="275" y="376" font-family="Inter, -apple-system, sans-serif"
        font-size="72" font-weight="300" letter-spacing="18"
        fill="#c8a96e">SWARM</text>

  <!-- Tagline -->
  <text x="277" y="430" font-family="Inter, -apple-system, sans-serif"
        font-size="18" font-weight="400" letter-spacing="3"
        fill="rgba(138,143,158,0.9)">SIGNAL OVER NOISE</text>

  <!-- Right side — domain pills -->
  <g transform="translate(820, 180)" font-family="Inter, sans-serif" font-size="13" font-weight="500">
    <!-- Row 1 -->
    <rect x="0" y="0" width="120" height="32" rx="16" fill="rgba(200,169,110,0.12)" stroke="rgba(200,169,110,0.3)" stroke-width="1"/>
    <text x="60" y="21" text-anchor="middle" fill="#c8a96e">🪙 Crypto</text>

    <rect x="136" y="0" width="120" height="32" rx="16" fill="rgba(91,156,246,0.1)" stroke="rgba(91,156,246,0.25)" stroke-width="1"/>
    <text x="196" y="21" text-anchor="middle" fill="#5b9cf6">🤖 AI Agents</text>

    <!-- Row 2 -->
    <rect x="0" y="48" width="120" height="32" rx="16" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
    <text x="60" y="69" text-anchor="middle" fill="#ff5c5c">⚔️ War</text>

    <rect x="136" y="48" width="120" height="32" rx="16" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
    <text x="196" y="69" text-anchor="middle" fill="#06b6d4">📊 Macro</text>

    <!-- Row 3 -->
    <rect x="0" y="96" width="120" height="32" rx="16" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
    <text x="60" y="117" text-anchor="middle" fill="#8b5cf6">🧠 Singularity</text>

    <rect x="136" y="96" width="120" height="32" rx="16" fill="rgba(20,184,166,0.1)" stroke="rgba(20,184,166,0.25)" stroke-width="1"/>
    <text x="196" y="117" text-anchor="middle" fill="#14b8a6">🌏 West-East</text>

    <!-- Row 4 -->
    <rect x="0" y="144" width="120" height="32" rx="16" fill="rgba(236,72,153,0.1)" stroke="rgba(236,72,153,0.25)" stroke-width="1"/>
    <text x="60" y="165" text-anchor="middle" fill="#ec4899">📡 Psyops</text>

    <rect x="136" y="144" width="120" height="32" rx="16" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
    <text x="196" y="165" text-anchor="middle" fill="#4ade80">🕳️ Conspiracy</text>

    <!-- Row 5 -->
    <rect x="0" y="192" width="120" height="32" rx="16" fill="rgba(68,64,60,0.4)" stroke="rgba(120,113,108,0.3)" stroke-width="1"/>
    <text x="60" y="213" text-anchor="middle" fill="#a8a29e">🖤 Black Budget</text>

    <rect x="136" y="192" width="120" height="32" rx="16" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
    <text x="196" y="213" text-anchor="middle" fill="#10b981">🌍 Emerging</text>

    <!-- Row 6 -->
    <rect x="0" y="240" width="256" height="32" rx="16" fill="rgba(200,169,110,0.06)" stroke="rgba(200,169,110,0.15)" stroke-width="1"/>
    <text x="128" y="261" text-anchor="middle" fill="rgba(200,169,110,0.6)" letter-spacing="2">+ 6 MORE DOMAINS</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="1200" height="3" fill="url(#bg)"/>
  <rect x="0" y="610" width="400" height="3" fill="#c8a96e" opacity="0.6"/>
  <rect x="400" y="610" width="400" height="3" fill="#5b9cf6" opacity="0.3"/>

  <!-- URL -->
  <text x="600" y="595" font-family="JetBrains Mono, monospace"
        font-size="13" text-anchor="middle" letter-spacing="1"
        fill="rgba(138,143,158,0.5)">intel-swarm.vercel.app</text>
</svg>
